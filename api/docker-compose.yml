version: '3.8'

services:
  # Application Service (Blue/Green candidate)
  api:
    build: .
    container_name: py-api-app
    restart: always
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/app_db
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./:/app
    networks:
      - app-network

  # Database
  db:
    image: postgres:15-alpine
    container_name: py-api-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
